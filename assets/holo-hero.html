  const rnd=(i,s)=>{let x=Math.sin((i+1)*s)*43758.5453;return x-Math.floor(x);};
  const sm=t=>t<=0?0:t>=1?1:t*t*(3-2*t), cl=(v,a,b)=>v<a?a:v>b?b:v;
  function layout(){
    const r=cv.getBoundingClientRect();W=Math.max(2,r.width);H=Math.max(2,r.height);
    cv.width=W*DPR;cv.height=H*DPR;buf.width=cv.width;buf.height=cv.height;
    const PAD=0.06,aw=W*(1-2*PAD),ah=H*(1-2*PAD);
    let bw=aw,bh=aw/HD.aspect;if(bh>ah){bh=ah;bw=ah*HD.aspect;}
    oX=(W-bw)/2;oY=(H-bh)/2;bW=bw;bH=bh;
    P=HD.pts.map((p,i)=>({bx:oX+p[0]*bw,by:oY+p[1]*bh,
      ph:rnd(i,12.9)*6.283,ph2:rnd(i,78.2)*6.283,sp:0.45+rnd(i,3.1)*0.7,am:0.005+rnd(i,5.7)*0.010}));
    TM=TR.map((t,m)=>{const cx=(HD.pts[t[0]][0]+HD.pts[t[1]][0]+HD.pts[t[2]][0])/3;
      const cy=(HD.pts[t[0]][1]+HD.pts[t[1]][1]+HD.pts[t[2]][1])/3;
      const edge=sm((cx-0.58)/0.24)*(rnd(m,4.4)<0.5?1:0);   // a few right-side chips flake
      return{nx:cx, o:0.45*rnd(m,2.3)+0.55*(1-cy), edge:edge,
        fsp:0.35+rnd(m,2.1)*0.6, fang:(rnd(m,8.3)-0.3)*1.0, spin:(rnd(m,1.9)-0.5)*1.6, brot:rnd(m,2.6)*6.283};});
  }
  function frame(now){
    const t=(now-t0)/1000,S=Math.min(W,H);
    const form=sm((t-0.3)/3.0), loose=(1-form)+form*0.22, vis=Math.min(1,t/1.2);  // assemble, then keep breathing (never static)
    const px=new Float32Array(N),py=new Float32Array(N);
    for(let i=0;i<N;i++){const p=P[i],a=reduce?0:p.am*S*loose;
      px[i]=p.bx+(reduce?0:Math.sin(t*p.sp+p.ph)*a);
      py[i]=p.by+(reduce?0:Math.cos(t*p.sp*0.92+p.ph2)*a);}
    const FA=new Float32Array(M),FL=new Float32Array(M);
    for(let m=0;m<M;m++){FA[m]=sm((form-TM[m].o*0.5)/0.45);
      FL[m]=reduce?0:form*TM[m].edge*Math.max(0,Math.sin(t*TM[m].fsp+TM[m].brot))*0.5;}  // constant slight flake
    // ---- old-style neighbour lines -> glow buffer (shimmering; thins over face at moments) ----
    const linePulse=0.5+0.5*Math.sin(t*0.55);
    const lineI=(1-form)+form*(0.12+0.42*linePulse);
    // gentle whole-body sway (pivot at the feet); same transform applied to photo + mesh so they track together
    const swA=(0.020*Math.sin(t*0.5)+0.007*Math.sin(t*0.29))*form;
    const swDx=bW*0.011*Math.sin(t*0.33)*form, swDy=bH*0.006*Math.sin(t*0.62)*form;
    const pvx=oX+bW/2, pvy=oY+bH;
    const fig=c=>{c.setTransform(DPR,0,0,DPR,0,0);c.translate(swDx,swDy);c.translate(pvx,pvy);c.rotate(swA);c.translate(-pvx,-pvy);};
    bctx.setTransform(DPR,0,0,DPR,0,0);bctx.clearRect(0,0,W,H);
    if(lineI>0.02){
      const D=S*0.05,cell=D,D2=D*D,cols=Math.max(1,Math.ceil(W/cell)),rows=Math.max(1,Math.ceil(H/cell)),grid=new Array(cols*rows);
      for(let i=0;i<N;i++){let cx=cl(px[i]/cell|0,0,cols-1),cy=cl(py[i]/cell|0,0,rows-1);(grid[cy*cols+cx]||(grid[cy*cols+cx]=[])).push(i);}
      const wave=((t*0.16)%1.5)-0.25;
      fig(bctx);bctx.lineWidth=0.9;bctx.globalCompositeOperation='lighter';
      for(let i=0;i<N;i++){const xi=px[i],yi=py[i];let cx=cl(xi/cell|0,0,cols-1),cy=cl(yi/cell|0,0,rows-1);
        for(let gx=cx-1;gx<=cx+1;gx++){if(gx<0||gx>=cols)continue;for(let gy=cy-1;gy<=cy+1;gy++){if(gy<0||gy>=rows)continue;
          const bk=grid[gy*cols+gx];if(!bk)continue;for(let b=0;b<bk.length;b++){const j=bk[b];if(j<=i)continue;
            const dx=px[j]-xi,dy=py[j]-yi,dd=dx*dx+dy*dy;if(dd<D2){const d=Math.sqrt(dd);let a=(1-d/D);
              const midY=(yi+py[j])*0.5,my=midY/H,fyrel=(midY-oY)/bH;
              const g=Math.exp(-((my-wave)*(my-wave))/0.016);
              const faceF=0.38+0.62*sm((fyrel-0.13)/0.08);   // thinner lines over the face
              a*=(0.32+1.2*g)*lineI*faceF;if(a<=0.02)continue;if(a>1)a=1;
              bctx.strokeStyle='rgba('+ACC+','+a.toFixed(3)+')';bctx.beginPath();bctx.moveTo(xi,yi);bctx.lineTo(px[j],py[j]);bctx.stroke();}}}}}
    }
    // ---- compose ----
    ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,cv.width,cv.height);
    ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.7*vis;try{ctx.filter='blur('+(5*DPR)+'px)';}catch(e){}ctx.drawImage(buf,0,0);ctx.filter='none';
    fig(ctx);ctx.globalCompositeOperation='source-over';
    // PHOTO revealed THROUGH the formed faces (clip to formed, non-flaking triangles)
    if(imgReady){ctx.save();ctx.beginPath();let any=false;
      for(let m=0;m<M;m++){if(FA[m]<0.55||FL[m]>0.05)continue;const tr=TR[m];any=true;
        ctx.moveTo(px[tr[0]],py[tr[0]]);ctx.lineTo(px[tr[1]],py[tr[1]]);ctx.lineTo(px[tr[2]],py[tr[2]]);ctx.closePath();}
      if(any){ctx.clip('nonzero');ctx.globalAlpha=vis;ctx.drawImage(IMG,oX,oY,bW,bH);}ctx.restore();}
    // forming front — coloured facets (triangles mid-assembly)
    for(let m=0;m<M;m++){const fa=FA[m];if(fa<=0.04||fa>=0.55||FL[m]>0.05)continue;const tr=TR[m];
      ctx.globalAlpha=fa*vis;ctx.fillStyle='rgb('+tr[3]+','+tr[4]+','+tr[5]+')';
      ctx.beginPath();ctx.moveTo(px[tr[0]],py[tr[0]]);ctx.lineTo(px[tr[1]],py[tr[1]]);ctx.lineTo(px[tr[2]],py[tr[2]]);ctx.closePath();ctx.fill();}
    // flaking chips — drift out a little then back (constant, side only)
    for(let m=0;m<M;m++){const fl=FL[m];if(fl<=0.05)continue;const tr=TR[m];
      let x0=px[tr[0]],y0=py[tr[0]],x1=px[tr[1]],y1=py[tr[1]],x2=px[tr[2]],y2=py[tr[2]];
      const cx=(x0+x1+x2)/3,cy=(y0+y1+y2)/3;
      const ox=fl*(bW*0.16+Math.cos(TM[m].fang)*bW*0.06), oy=fl*(Math.sin(TM[m].fang)*bH*0.05);
      const rot=TM[m].spin*fl, cc=Math.cos(rot),ss=Math.sin(rot);
      const dx0=x0-cx,dy0=y0-cy,dx1=x1-cx,dy1=y1-cy,dx2=x2-cx,dy2=y2-cy;
      x0=cx+dx0*cc-dy0*ss+ox;y0=cy+dx0*ss+dy0*cc+oy;x1=cx+dx1*cc-dy1*ss+ox;y1=cy+dx1*ss+dy1*cc+oy;x2=cx+dx2*cc-dy2*ss+ox;y2=cy+dx2*ss+dy2*cc+oy;
      ctx.globalAlpha=(1-fl*0.5)*vis;ctx.fillStyle='rgb('+tr[3]+','+tr[4]+','+tr[5]+')';
      ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.lineTo(x2,y2);ctx.closePath();ctx.fill();}
    // sharp line glow pass
    ctx.setTransform(1,0,0,1,0,0);ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.5*vis;ctx.drawImage(buf,0,0);
    ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
    if(!reduce&&running)raf=requestAnimationFrame(frame);
  }
  window.addEventListener('message',function(e){if(e.data==='holo-pause'){running=false;}else if(e.data==='holo-resume'&&!running){running=true;raf=requestAnimationFrame(frame);}});
  function start(){layout();cancelAnimationFrame(raf);t0=performance.now();raf=requestAnimationFrame(frame);}
  let rz;window.addEventListener('resize',()=>{clearTimeout(rz);rz=setTimeout(layout,150);});
  if(document.readyState!=='loading')start();else window.addEventListener('DOMContentLoaded',start);
})();
