  function triangulate(){

      bx:oX+p[0]*bw, by:oY+p[1]*bh, z:p[2], e:p[3],
      ph:rnd(i,12.9)*6.283, ph2:rnd(i,78.2)*6.283,
      sp:0.45+rnd(i,3.1)*0.7, am:0.006+rnd(i,5.7)*0.011
    }));
    if(!tris) triangulate();
    if(!triColors) sampleColors();
  }

  function frame(now){
    const t=(now-t0)/1000, S=Math.min(W,H);
    const PER=9.0; let xx=(t%PER)-4.6; const focus=Math.exp(-(xx*xx)/(2*0.85*0.85));
    const wave=((t*0.15)%1.5)-0.25;
    const settle=1-0.93*focus;             // points lock to anchors at focus
    const D=S*0.052*(1+0.08*focus), cell=D, D2=D*D;

    const px=new Float32Array(N), py=new Float32Array(N);
    for(let i=0;i<N;i++){
      const p=pts[i], a=reduce?0:p.am*S*settle;
      px[i]=p.bx + (reduce?0:Math.sin(t*p.sp+p.ph)*a);
      py[i]=p.by + (reduce?0:Math.cos(t*p.sp*0.92+p.ph2)*a);
    }
    const cols=Math.max(1,Math.ceil(W/cell)), rows=Math.max(1,Math.ceil(H/cell));
    const grid=new Array(cols*rows);
    for(let i=0;i<N;i++){
      let cx=px[i]/cell|0, cy=py[i]/cell|0;
      cx=cx<0?0:cx>=cols?cols-1:cx; cy=cy<0?0:cy>=rows?rows-1:cy;
      const k=cy*cols+cx;(grid[k]||(grid[k]=[])).push(i);
    }
    bctx.setTransform(DPR,0,0,DPR,0,0); bctx.clearRect(0,0,W,H);
    bctx.lineWidth=0.9; bctx.globalCompositeOperation='lighter';
    for(let i=0;i<N;i++){
      const xi=px[i],yi=py[i];
      let cx=xi/cell|0, cy=yi/cell|0;
      cx=cx<0?0:cx>=cols?cols-1:cx; cy=cy<0?0:cy>=rows?rows-1:cy;
      for(let gx=cx-1;gx<=cx+1;gx++){ if(gx<0||gx>=cols)continue;
        for(let gy=cy-1;gy<=cy+1;gy++){ if(gy<0||gy>=rows)continue;
          const bk=grid[gy*cols+gx]; if(!bk)continue;
          for(let b=0;b<bk.length;b++){
            const j=bk[b]; if(j<=i)continue;
            const dx=px[j]-xi, dy=py[j]-yi, dd=dx*dx+dy*dy;
            if(dd<D2){
              const d=Math.sqrt(dd); let a=1-d/D;
              const my=((yi+py[j])*0.5)/H;
              const g=Math.exp(-((my-wave)*(my-wave))/0.016);
              a*=(0.32+0.95*g);                         // переливание (волна)
              if(focus>0.02) a*=(1+focus*0.45);
              if(a<=0.02)continue; if(a>1.5)a=1.5;
              bctx.strokeStyle='rgba('+ACC+','+a.toFixed(3)+')';
              bctx.beginPath(); bctx.moveTo(xi,yi); bctx.lineTo(px[j],py[j]); bctx.stroke();
            }
          }
        }
      }
    }
    for(let i=0;i<N;i+=2){
      bctx.fillStyle='rgba('+ACC+',0.12)';
      bctx.beginPath(); bctx.arc(px[i],py[i],0.7,0,6.283); bctx.fill();
    }

    // ---- compose ----
    const facetA=Math.min(1,Math.max(0,(focus-0.12)/0.62));   // грани собираются по мере схода точек
    const photoA=Math.min(1,Math.max(0,(focus-0.78)/0.22));   // чёткое фото проявляется только на пике
    ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,cv.width,cv.height);

    // glow от сетки (гаснет по мере проявления фото)
    ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=0.8*(1-0.72*focus);
    try{ctx.filter='blur('+((7-3*focus)*DPR)+'px)';}catch(e){}
    ctx.drawImage(buf,0,0);
    ctx.filter='none';

    // грани: фото собирается из треугольников, которые следуют за вершинами
    if(triColors && facetA>0.002){
      ctx.setTransform(DPR,0,0,DPR,0,0);
      ctx.globalCompositeOperation='source-over';
      ctx.globalAlpha=facetA;
      ctx.lineWidth=0.8; ctx.lineJoin='round';
      for(let ti=0;ti<tris.length;ti++){
        const t=tris[ti], c=triColors[ti];
        const col='rgb('+c[0]+','+c[1]+','+c[2]+')';
        ctx.fillStyle=col; ctx.strokeStyle=col;   // stroke закрывает швы между гранями
        ctx.beginPath();
        ctx.moveTo(px[t[0]],py[t[0]]); ctx.lineTo(px[t[1]],py[t[1]]); ctx.lineTo(px[t[2]],py[t[2]]); ctx.closePath();
        ctx.fill(); ctx.stroke();
      }
      ctx.globalAlpha=1;
    }

    // чёткое фото поверх граней — финальная «нормальная» картинка на пике
    if(imgReady && photoA>0.002){
      ctx.setTransform(DPR,0,0,DPR,0,0);
      ctx.globalCompositeOperation='source-over';
      ctx.globalAlpha=photoA;
      ctx.drawImage(IMG,oX,oY,bW,bH);
      ctx.globalAlpha=1;
    }

    // светящиеся рёбра: сильны в распаде, тают когда грани собраны (эффект скан-голограммы)
    ctx.setTransform(1,0,0,1,0,0);
    ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=Math.max(0,0.95*(1-0.92*facetA))+0.10*photoA;
    ctx.drawImage(buf,0,0);

    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
    if(!reduce) raf=requestAnimationFrame(frame);
  }
  function start(){ layout(); cancelAnimationFrame(raf); t0=performance.now(); raf=requestAnimationFrame(frame); }
  let rz; window.addEventListener('resize',()=>{clearTimeout(rz);rz=setTimeout(layout,150);});
  if(document.readyState!=='loading') start();
  else document.addEventListener('DOMContentLoaded',start);
})();
</script>
</body>
